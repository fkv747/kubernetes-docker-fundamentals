apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: 616859360734.dkr.ecr.us-east-1.amazonaws.com/flask-eks-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000